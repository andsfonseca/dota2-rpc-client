name: Build

on: [pull_request]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: "Windows Latest MSVC",
              artifact: "dota2-rpc-client",
              os: windows-latest,
              cc: "cl",
              cxx: "cl",
              environment_script: "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat",
            }
          - {
              name: "Ubuntu 22.04 GCC",
              artifact: "dota2-rpc-client-linux",
              os: ubuntu-22.04,
              build_type: "Release",
              cc: "gcc",
              cxx: "g++",
            }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev

      - name: Get CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 4.2.3

      - name: Install Conan
        uses: turtlebrowser/get-conan@main
        with:
          version: 2.26.2

      - name: Detect and Configure Conan Profile
        run: |
          conan profile detect --force

      - name: Set C++17 in Conan Profile (Windows)
        if: runner.os == 'Windows'
        run: |
          $profilePath = "$env:USERPROFILE\.conan2\profiles\default"
          (Get-Content $profilePath) -replace 'compiler.cppstd=14', 'compiler.cppstd=17' | Set-Content $profilePath
          Write-Host "Updated Windows Conan profile:"
          Get-Content $profilePath
        shell: pwsh

      - name: Set C++17 in Conan Profile (Linux)
        if: runner.os == 'Linux'
        run: |
          profilePath="$HOME/.conan2/profiles/default"
          sed -i 's/compiler.cppstd=gnu14/compiler.cppstd=17/g' "$profilePath"
          sed -i 's/compiler.cppstd=14/compiler.cppstd=17/g' "$profilePath"
          echo "Updated Linux Conan profile:"
          cat "$profilePath"

      - name: Cache Conan Packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ runner.arch }}-
            conan-${{ runner.os }}-

      - name: Create ConanFile Lock
        run: conan lock create conanfile.txt --lockfile-node-context=host 2>&1 || true

      - name: Configure Project
        run: cmake -S . -B ./build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build ./build --config Release --target dota2-rpc-client --parallel

      - name: Prepare Windows Package
        if: runner.os == 'Windows'
        run: |
          ls -la ./build/Release/
        shell: bash

      - name: Prepare Linux Package
        if: runner.os == 'Linux'
        run: |
          mkdir -p ./build/dota2-rpc-client-linux

          # Copy binary and data files
          cp ./build/dota2-rpc-client ./build/dota2-rpc-client-linux/
          cp -r ./build/lang ./build/dota2-rpc-client-linux/
          cp -r ./build/templates ./build/dota2-rpc-client-linux/
          cp ./build/config.json ./build/dota2-rpc-client-linux/

          # Copy installation scripts
          cp ./build/install-service.sh ./build/dota2-rpc-client-linux/
          cp ./build/uninstall-service.sh ./build/dota2-rpc-client-linux/
          cp ./build/dota2-rpc-client.service ./build/dota2-rpc-client-linux/

          # Make scripts executable
          chmod +x ./build/dota2-rpc-client-linux/dota2-rpc-client
          chmod +x ./build/dota2-rpc-client-linux/install-service.sh
          chmod +x ./build/dota2-rpc-client-linux/uninstall-service.sh

          echo "Linux package prepared:"
          ls -la ./build/dota2-rpc-client-linux/

      - name: Upload Windows Artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          path: ./build/Release
          name: ${{ matrix.config.artifact }}

      - name: Upload Linux Artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          path: ./build/dota2-rpc-client-linux
          name: ${{ matrix.config.artifact }}
